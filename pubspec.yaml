name: calculus_system
description: A modern calculus solver for mobile and desktop.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Routing ────────────────────────────────────────────────
  go_router: ^13.0.0

  # ── Graphing ───────────────────────────────────────────────
  fl_chart: ^0.68.0          # used by module graph/ classes

  # ── Math rendering ─────────────────────────────────────────
  flutter_math_fork: ^0.7.2  # LaTeX rendering in StepsDrawer

  # ── State management ───────────────────────────────────────
  provider: ^6.1.0           # optional — use if state grows

  # ── Utilities ──────────────────────────────────────────────
  equatable: ^2.0.5          # value equality on model classes

  # ── Animation Optimization ─────────────────────────────────
  visibility_detector: ^0.4.0+2  # pause animations when off-screen
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1"

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"