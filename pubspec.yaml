name: calculus_system
description: A modern calculus solver for mobile and desktop.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
    
  cupertino_icons: ^1.0.8
  # ── Routing ──────────────────────────────────────────────────
  go_router: ^13.0.0

  # ── Graphing ─────────────────────────────────────────────────
  fl_chart: ^0.68.0

  
  # ── Math rendering ───────────────────────────────────────────
  flutter_math_fork: 
    git:
      url: https://github.com/simpleclub/flutter_math
      ref: main

  # ── Math computation (per README) ─────────────────────────────
  equations: ^6.0.0             # Equation solving
  math_expressions: ^2.6.0      # Expression parsing and differentiation
  fn_express: ^1.0.0            # Symbolic derivatives

  # ── State management ─────────────────────────────────────────
  provider: ^6.1.0

  # ── Utilities ───────────────────────────────────────────────
  equatable: ^2.0.5

  # ── Animation optimization ──────────────────────────────────
  visibility_detector: ^0.4.0+2

  # ── Local storage (activation gate) ─────────────────────────
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: launcher_icon
  ios: true
  image_path: assets/images/app_icon.png
  web:
    generate: true
    image_path: assets/images/app_icon.png